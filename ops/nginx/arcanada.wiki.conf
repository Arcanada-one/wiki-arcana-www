# x-exposure-justification: Public Wiki Arcana landing behind Cloudflare proxy, origin TLS, nginx security headers and rate limits
# x-exposure-expires: 2026-10-14
server { listen 80; listen [::]:80; server_name arcanada.wiki; return 301 https://$host$request_uri; }
server {
 listen 443 ssl http2; listen [::]:443 ssl http2; server_name arcanada.wiki;
 root /var/www/arcanada.wiki; index index.php;
 ssl_certificate /etc/ssl/cloudflare/arcanada.wiki.pem;
 ssl_certificate_key /etc/ssl/cloudflare/arcanada.wiki-key.pem;
 ssl_protocols TLSv1.2 TLSv1.3; ssl_session_tickets off;
 add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
 add_header X-Content-Type-Options nosniff always; add_header Referrer-Policy strict-origin-when-cross-origin always;
 add_header X-Frame-Options DENY always;
 add_header Content-Security-Policy "default-src 'self'; style-src 'self'; img-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;
 location / { try_files $uri $uri/ /index.php?$query_string; }
 location ~ \.php$ { include snippets/fastcgi-php.conf; fastcgi_pass unix:/run/php/php8.3-fpm.sock; }
}

